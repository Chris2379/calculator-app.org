<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: arial, sans-serif;
      background: #fff;
      color: #202124;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      display: flex;
      justify-content: flex-end;
      padding: 8px 20px 0;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-link {
      font-size: 13px;
      color: #202124;
      text-decoration: none;
      padding: 6px 8px;
    }

    .nav-link:hover { text-decoration: underline; }

    .apps-btn {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; border: none; background: none; cursor: pointer;
    }

    .apps-btn:hover { background: rgba(60,64,67,0.08); }

    .dots-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px; width: 18px; height: 18px;
    }

    .dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: #5f6368;
      display: block;
    }

    .signin-btn {
      font-size: 14px; font-weight: 600;
      color: #fff; background: #1a73e8;
      border: none; border-radius: 4px;
      padding: 9px 23px; cursor: pointer;
    }

    .signin-btn:hover { background: #1558b0; }

    /* Main */
    main {
      flex: 1;
      display: flex; flex-direction: column; align-items: center;
      padding-top: 92px;
    }

    .logo { width: 272px; height: 92px; margin-bottom: 28px; }

    /* Search box */
    .search-form {
      width: 100%; max-width: 584px;
      display: flex; flex-direction: column; align-items: center;
    }

    .search-box {
      display: flex; align-items: center;
      width: 100%; height: 44px;
      border: 1px solid #dfe1e5; border-radius: 24px;
      padding: 0 14px; gap: 8px; background: #fff;
      transition: box-shadow .2s, border-color .2s;
    }

    .search-box:hover, .search-box:focus-within {
      box-shadow: 0 1px 6px rgba(32,33,36,.28);
      border-color: transparent;
    }

    .search-icon { width: 20px; height: 20px; fill: #9aa0a6; flex-shrink: 0; }

    #search-input {
      flex: 1; border: none; outline: none;
      font-size: 16px; color: #202124;
      background: transparent; height: 100%;
      caret-color: #1a73e8;
    }

    .clear-btn {
      width: 20px; height: 20px;
      display: none; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer; padding: 0; flex-shrink: 0;
    }

    .clear-btn svg { width: 18px; height: 18px; fill: #70757a; }

    .divider { width: 1px; height: 24px; background: #dfe1e5; flex-shrink: 0; }

    .voice-btn {
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer; flex-shrink: 0;
    }

    /* Buttons */
    .search-buttons {
      display: flex; gap: 10px;
      margin-top: 24px; justify-content: center; flex-wrap: wrap;
    }

    .search-btn, .lucky-btn {
      background: #f8f9fa; border: 1px solid #f8f9fa;
      border-radius: 4px; color: #3c4043;
      cursor: pointer; font-size: 14px;
      padding: 0 16px; height: 36px; white-space: nowrap;
    }

    .search-btn:hover, .lucky-btn:hover {
      box-shadow: 0 1px 1px rgba(0,0,0,.1);
      border-color: #dadce0;
    }

    /* Info */
    .search-info {
      margin-top: 16px; font-size: 12px;
      color: #70757a; text-align: center;
    }

    /* Language */
    .lang-row { margin-top: 24px; font-size: 13px; color: #202124; }
    .lang-link { color: #1558d6; text-decoration: none; margin-left: 6px; }
    .lang-link:hover { text-decoration: underline; }

    /* Footer */
    footer {
      background: #f2f2f2; border-top: 1px solid #e4e4e4;
      padding: 15px 30px;
    }

    .footer-country {
      font-size: 15px; color: #70757a;
      padding-bottom: 14px; border-bottom: 1px solid #e4e4e4;
      margin-bottom: 12px;
    }

    .footer-links {
      display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
    }

    .footer-left, .footer-right { display: flex; gap: 20px; flex-wrap: wrap; }

    .footer-link { font-size: 14px; color: #70757a; text-decoration: none; }
    .footer-link:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      main { padding-top: 60px; }
      .search-form { max-width: calc(100vw - 32px); }
      .logo { width: 200px; height: 68px; }
      footer { padding: 15px 16px; }
    }
  </style>
</head>
<body>

<header>
  <nav>
    <a href="#" class="nav-link">Gmail</a>
    <a href="#" class="nav-link">Images</a>
    <button class="apps-btn" aria-label="Google apps">
      <div class="dots-grid">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>
    </button>
    <button class="signin-btn">Sign in</button>
  </nav>
</header>

<main>
  <svg class="logo" viewBox="0 0 272 92" aria-label="Google">
    <path d="M115.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18C71.25 34.32 81.24 25 93.5 25s22.25 9.32 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44S80.99 39.2 80.99 47.18c0 7.9 5.79 13.44 12.51 13.44s12.51-5.55 12.51-13.44z" fill="#EA4335"/>
    <path d="M163.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18c0-12.85 9.99-22.18 22.25-22.18s22.25 9.32 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44s-12.51 5.46-12.51 13.44c0 7.9 5.79 13.44 12.51 13.44s12.51-5.55 12.51-13.44z" fill="#FBBC05"/>
    <path d="M209.75 26.34v39.82c0 16.38-9.66 23.07-21.08 23.07-10.75 0-17.22-7.19-19.66-13.07l8.48-3.53c1.51 3.61 5.21 7.87 11.17 7.87 7.31 0 11.84-4.51 11.84-13v-3.19h-.34c-2.18 2.69-6.38 5.04-11.68 5.04-11.09 0-21.25-9.66-21.25-22.09 0-12.52 10.16-22.26 21.25-22.26 5.29 0 9.49 2.35 11.68 4.96h.34v-3.61h9.25zm-8.56 20.92c0-7.81-5.21-13.52-11.84-13.52-6.72 0-12.35 5.71-12.35 13.52 0 7.73 5.63 13.36 12.35 13.36 6.63 0 11.84-5.63 11.84-13.36z" fill="#4285F4"/>
    <path d="M225 3v65h-9.5V3h9.5z" fill="#34A853"/>
    <path d="M262.02 54.48l7.56 5.04c-2.44 3.61-8.32 9.83-18.48 9.83-12.6 0-22.01-9.74-22.01-22.18 0-13.19 9.49-22.18 20.92-22.18 11.51 0 17.14 9.16 18.98 14.11l1.01 2.52-29.65 12.28c2.27 4.45 5.8 6.72 10.75 6.72 4.96 0 8.4-2.44 10.92-6.14zm-23.27-7.98l19.82-8.23c-1.09-2.77-4.37-4.7-8.23-4.7-4.95 0-11.84 4.37-11.59 12.93z" fill="#EA4335"/>
    <path d="M35.29 41.41V32H67c.31 1.64.47 3.58.47 5.68 0 7.06-1.93 15.79-8.15 22.01-6.05 6.3-13.78 9.66-24.02 9.66C16.32 69.35.36 53.89.36 34.72.36 15.55 16.32.09 35.5.09c10.5 0 17.98 4.12 23.6 9.49l-6.64 6.64c-4.03-3.78-9.49-6.72-16.97-6.72-13.86 0-24.7 11.17-24.7 25.03 0 13.86 10.84 25.03 24.7 25.03 8.99 0 14.11-3.61 17.39-6.89 2.66-2.66 4.41-6.46 5.1-11.65z" fill="#4285F4"/>
  </svg>

  <form class="search-form" onsubmit="doSearch(event)">
    <div class="search-box">
      <svg class="search-icon" viewBox="0 0 24 24">
        <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
      <input
        id="search-input"
        type="text"
        autocomplete="off"
        spellcheck="false"
        aria-label="Search"
        oninput="onInput()"
      />
      <button type="button" class="clear-btn" id="clear-btn" onclick="clearInput()" aria-label="Clear">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
      <div class="divider"></div>
      <button type="button" class="voice-btn" aria-label="Search by voice">
        <svg viewBox="0 0 24 24" width="24" height="24">
          <path fill="#4285f4" d="M12 15c1.66 0 3-1.34 3-3V6c0-1.66-1.34-3-3-3S9 4.34 9 6v6c0 1.66 1.34 3 3 3z"/>
          <path fill="#34a853" d="M11 18.08V21h2v-2.92c2.83-.46 5-2.9 5-5.58h-2c0 2.21-1.79 4-4 4s-4-1.79-4-4H6c0 2.68 2.17 5.12 5 5.58z"/>
        </svg>
      </button>
    </div>

    <div class="search-buttons">
      <button type="submit" class="search-btn">Google Search</button>
      <button type="button" class="lucky-btn" onclick="doSearch(event)">I'm Feeling Lucky</button>
    </div>

    <div class="search-info">🦆 Searches are routed through DuckDuckGo for enhanced privacy.</div>
  </form>

  <div class="lang-row">Google offered in: <a href="#" class="lang-link">Español</a></div>
</main>

<footer>
  <div class="footer-country">United States</div>
  <div class="footer-links">
    <div class="footer-left">
      <a href="#" class="footer-link">About</a>
      <a href="#" class="footer-link">Advertising</a>
      <a href="#" class="footer-link">Business</a>
      <a href="#" class="footer-link">How Search works</a>
    </div>
    <div class="footer-right">
      <a href="#" class="footer-link">Privacy</a>
      <a href="#" class="footer-link">Terms</a>
      <a href="#" class="footer-link">Settings</a>
    </div>
  </div>
</footer>

<script>
  const input = document.getElementById('search-input');
  const clearBtn = document.getElementById('clear-btn');

  input.focus();

  function onInput() {
    clearBtn.style.display = input.value ? 'flex' : 'none';
  }

  function clearInput() {
    input.value = '';
    clearBtn.style.display = 'none';
    input.focus();
  }

  function doSearch(e) {
    e.preventDefault();
    const q = input.value.trim();
    if (!q) return;
    window.location.href = 'https://duckduckgo.com/?q=' + encodeURIComponent(q);
  }
</script>

</body>
</html>
